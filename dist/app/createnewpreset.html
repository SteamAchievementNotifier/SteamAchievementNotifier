<div class="wrapper">

    <div class="wrapper opt">
        <span class="lbl"></span>
        <select name="createnewpresetlogo" id="createnewpresetlogo">
            <option value="none"></option>
            <option value="fixed" selected></option>
        </select>
        <div class="wrapper">
            <button id="createnewpresetlogoimg" style="--icon: url('../../img/sanlogotrophy.svg');"></button>
        </div>
    </div>
    <div class="wrapper opt">
        <span class="lbl"></span>
        <select name="createnewpresetdecoration" id="createnewpresetdecoration">
            <option value="none" selected></option>
            <option value="fixed"></option>
            <option value="dynamic"></option>
        </select>
        <div class="wrapper">
            <button id="createnewpresetdecorationimg1" style="--icon: url('../../img/sanlogotrophy_bronze.svg');"></button>
            <button id="createnewpresetdecorationimg2" style="--icon: url('../../img/sanlogotrophy_silver.svg');"></button>
            <button id="createnewpresetdecorationimg3" style="--icon: url('../../img/sanlogotrophy_gold.svg');"></button>

        <span id="createnewpresetlog"></span>
